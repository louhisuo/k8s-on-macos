---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app headlamp
  namespace: &ns flux-system
spec:
  path: ./headlamp
  sourceRef:
    kind: ExternalArtifact
    name: headlamp
    namespace: *ns
  targetNamespace: headlamp
  dependsOn:
    - name: cert-manager
    - name: cilium
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true