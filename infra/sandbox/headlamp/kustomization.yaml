---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headlamp
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - httproute.yaml
  - ingress.yaml
configMapGenerator:
  - name: headlamp-values
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml