apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: namespace
resources:
  - namespace.yaml
  - helmrepository-ocirepo.yaml
  - helmrelease-ocirepo.yaml
configMapGenerator:
  - name: app-values
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml