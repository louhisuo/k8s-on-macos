apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app metrics-server
  namespace: &ns kube-system
spec:
  chart:
    spec:
      chart: charts/metrics-server
      sourceRef:
        kind: GitRepository
        name: *app
        namespace: *ns
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy: 
      name: RemediateOnFailure
    remediation:
      retries: 3
      strategy: rollback
  rollback:
    cleanupOnFail: true
    recreate: true
  valuesFrom:
    - kind: ConfigMap
      name: metrics-server-values
  interval: 15m
  maxHistory: 3
