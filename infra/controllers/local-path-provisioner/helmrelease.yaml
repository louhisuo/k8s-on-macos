---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app local-path-provisioner
  namespace: &ns local-path
spec:
  chart:
    spec:
      chart: deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: *app
        namespace: *ns
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy: 
      name: RemediateOnFailure
    remediation:
      retries: 3
      strategy: rollback
  rollback:
    cleanupOnFail: true
    recreate: true
  valuesFrom:
  - kind: ConfigMap
    name: local-path-storage-values
  interval: 15m
  maxHistory: 3
