---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app crds-cert-manager
  namespace: &ns flux-system
spec:
  path: ./deploy/crds
  sourceRef:
    kind: GitRepository
    name: cert-manager-crds
    namespace: cert-manager
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true